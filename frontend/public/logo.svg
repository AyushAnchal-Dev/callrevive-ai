<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>
    
    <!-- Accent Gradient (Violet to Indigo) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Sparkle Gradient (Gold/Amber) -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Container Group -->
  <g transform="translate(10, 10)">
    <!-- Logo Icon Group -->
    <g transform="translate(10, 0)">
      <!-- Outer circle/ring -->
      <circle cx="50" cy="50" r="45" fill="none" stroke="url(#accentGrad)" stroke-width="4.5" stroke-opacity="0.8" filter="url(#glow)" />
      <!-- Inside phone icon -->
      <path d="M50 32 a 12 12 0 0 1 12 12 l-3 0 a 9 9 0 0 0 -9 -9 l0 -3 Z" fill="url(#sparkleGrad)" filter="url(#glow)" />
      <path d="M40 32 C38 36 38 42 42 46 C46 50 52 50 56 48 L61 53 A 2 2 0 0 1 58 56 L55 53 C50 55 43 54 38 49 C33 44 32 37 34 32 L31 29 A 2 2 0 0 1 34 26 Z" fill="url(#accentGrad)" />
      <path d="M42 35 C43 38 45 40 48 41 L47 43 C43 42 40 39 39 35 Z" fill="url(#accentGrad)" />
      
      <!-- Sparkle -->
      <path d="M72 25 c0 4 3 7 7 7 c-4 0 -7 3 -7 7 c0 -4 -3 -7 -7 -7 c4 0 7 -3 7 -7 Z" fill="url(#sparkleGrad)" filter="url(#glow)" />
    </g>

    <!-- Logo Text Group -->
    <g transform="translate(130, 62)">
      <!-- CallRevive Text -->
      <text font-family="'Inter', sans-serif" font-weight="900" font-size="44" fill="#ffffff" letter-spacing="-1">
        Call<tspan fill="url(#accentGrad)">Revive</tspan>
      </text>
      <!-- Subtitle/AI platform -->
      <text font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="url(#sparkleGrad)" letter-spacing="3" y="24" x="2">
        AI ASSISTANT PLATFORM
      </text>
    </g>
  </g>
</svg>
