<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16" />
      <stop offset="100%" stop-color="#05050a" />
    </linearGradient>
    
    <!-- Accent Gradient (Violet to Indigo) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- Sparkle Gradient (Gold/Amber) -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#8b5cf6" stroke-width="6" stroke-opacity="0.2" />

  <!-- Outer Ring with Gradient -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#accentGrad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="900" stroke-dashoffset="150" />

  <!-- Phone Recovery Icon -->
  <g transform="translate(148, 148) scale(1.7)" filter="url(#glow)">
    <!-- Phone Receiver -->
    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" 
          fill="none" 
          stroke="url(#accentGrad)" 
          stroke-width="6.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- Sparkles / AI Magic -->
  <!-- Top Right Sparkle -->
  <path d="M370 120 c0 15 10 25 25 25 c-15 0 -25 10 -25 25 c0 -15 -10 -25 -25 -25 c15 0 25 -10 25 -25 Z" fill="url(#sparkleGrad)" filter="url(#glow)" />
  <!-- Small Sparkle -->
  <path d="M120 340 c0 8 5 13 13 13 c-8 0 -13 5 -13 13 c0 -8 -5 -13 -13 -13 c8 0 13 -5 13 -13 Z" fill="url(#sparkleGrad)" />
  <!-- Center top Sparkle -->
  <path d="M300 210 c0 10 7 17 17 17 c-10 0 -17 7 -17 17 c0 -10 -7 -17 -17 -17 c10 0 17 -10 17 -17 Z" fill="url(#sparkleGrad)" />
</svg>
