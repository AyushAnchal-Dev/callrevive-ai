services:
  # ------------------------------------------------------------------
  # Backend API (FastAPI)
  # ------------------------------------------------------------------
  - type: web
    name: callrevive-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: callrevive-db
          property: connectionString
      - key: DATABASE_SYNC_URL
        fromDatabase:
          name: callrevive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: callrevive-redis
          property: connectionString
      - key: CLOUDAMQP_URL
        sync: false # User to supply RabbitMQ/AMQP URL manually
      - key: GEMINI_API_KEY
        sync: false # User to supply Gemini key manually
      - key: TWILIO_ACCOUNT_SID
        sync: false # User to supply Twilio key manually
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: FRONTEND_URL
        value: https://callrevive.onrender.com # Change to actual static site URL on Render

  # ------------------------------------------------------------------
  # Celery Background Worker
  # ------------------------------------------------------------------
  - type: worker
    name: callrevive-worker
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.worker.celery_app worker --loglevel=info
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: callrevive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: callrevive-redis
          property: connectionString
      - key: CLOUDAMQP_URL
        sync: false # User to supply RabbitMQ/AMQP URL manually
      - key: GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # ------------------------------------------------------------------
  # Frontend Static Site (React/Vite)
  # ------------------------------------------------------------------
  - type: web
    name: callrevive-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: callrevive-api
          property: url

# ------------------------------------------------------------------
# Managed Infrastructure Services
# ------------------------------------------------------------------
databases:
  - name: callrevive-db
    plan: free
    postgresMajorVersion: "16"

redis:
  - name: callrevive-redis
    plan: free
    ipAllowList: [] # default to allow all within the render network
