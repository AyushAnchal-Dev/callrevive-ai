apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: callrevive-ingress
  namespace: callrevive
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false" # Set true in production with TLS
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
  - host: callrevive.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: callrevive-frontend
            port:
              number: 80
  - host: api.callrevive.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: callrevive-backend
            port:
              number: 8000
