apiVersion: apps/v1
kind: Deployment
metadata:
  name: callrevive-worker
  namespace: callrevive
  labels:
    app: callrevive-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: callrevive-worker
  template:
    metadata:
      labels:
        app: callrevive-worker
    spec:
      containers:
      - name: worker
        image: callrevive-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        # Load from configmap
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: APP_ENV
        - name: APP_DEBUG
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: APP_DEBUG
        - name: TWILIO_PHONE_NUMBER
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: TWILIO_PHONE_NUMBER
        - name: TWILIO_WHATSAPP_NUMBER
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: TWILIO_WHATSAPP_NUMBER
        - name: BACKBLAZE_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: BACKBLAZE_BUCKET_NAME
        - name: BACKBLAZE_BUCKET_ID
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: BACKBLAZE_BUCKET_ID
        - name: BACKBLAZE_ENDPOINT_URL
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: BACKBLAZE_ENDPOINT_URL
        - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        - name: JWT_REFRESH_TOKEN_EXPIRE_DAYS
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: FRONTEND_URL
        - name: BACKEND_URL
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: BACKEND_URL
        - name: PROMETHEUS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: callrevive-config
              key: PROMETHEUS_ENABLED
        
        # Load secrets
        - name: APP_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: app-secret-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: database-url
        - name: DATABASE_SYNC_URL
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: database-sync-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: redis-url
        - name: CLOUDAMQP_URL
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: cloudamqp-url
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: gemini-api-key
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: twilio-account-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: twilio-auth-token
        - name: BACKBLAZE_KEY_ID
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: backblaze-key-id
        - name: BACKBLAZE_APPLICATION_KEY
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: backblaze-application-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: callrevive-secrets
              key: jwt-secret
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
