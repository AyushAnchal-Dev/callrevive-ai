apiVersion: apps/v1
kind: Deployment
metadata:
  name: callrevive-frontend
  namespace: callrevive
  labels:
    app: callrevive-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: callrevive-frontend
  template:
    metadata:
      labels:
        app: callrevive-frontend
    spec:
      containers:
      - name: frontend
        image: callrevive-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: callrevive-frontend
  namespace: callrevive
spec:
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app: callrevive-frontend
  type: ClusterIP
