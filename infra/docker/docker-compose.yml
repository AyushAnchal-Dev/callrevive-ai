version: "3.9"

services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - callrevive

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile.worker
    env_file:
      - ../../backend/.env
    depends_on:
      - api
      - rabbitmq
      - redis
    networks:
      - callrevive

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: callrevive
      POSTGRES_USER: callrevive
      POSTGRES_PASSWORD: callrevive_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callrevive"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - callrevive

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - callrevive

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - callrevive

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  callrevive:
    driver: bridge
