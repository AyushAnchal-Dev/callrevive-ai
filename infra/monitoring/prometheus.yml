global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "callrevive-backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["callrevive-backend.callrevive.svc.cluster.local:8000"]
