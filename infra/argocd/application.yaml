apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: callrevive-gitops
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/callrevive-ai.git # Replace with your actual Git repo URL
    targetRevision: main
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: callrevive
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
